paths:
  /users/{userId}/{property}:
    get:
      summary: Get a user by ID
      parameters:
        - in: path
          name: userId
          schema:
            type: integer
          required: true
          description: Numeric ID of the user to get
        - in: path
          name: property
          schema:
            type: string
          required: true
          description: Property of user
        - in: query
          name: formatted
          schema:
            type: boolean
          description: Wether to format result 
